spring:
  datasource:
    url: jdbc:mysql://localhost:3306/mc_data
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  thymeleaf:
    cache: false      # 开发时关闭缓存，方便调试
    prefix: classpath:/templates/
    suffix: .html
  servlet:
    multipart:
      max-file-size: 1000MB      # 单个文件最大大小
      max-request-size: 1000MB   # 整个请求最大大小（包括多个文件）

server:
  port: 8080