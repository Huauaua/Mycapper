<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>上传Mod - MCMod管理</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" href="/css/style.css">
    <script src="/js/script.js"></script>
</head>
<body>
<!-- 头部区域（与列表页保持一致） -->
<div id="header-container"></div>

<div class="container">
    <h1>📤 上传Mod</h1>
    <form th:action="@{/mods/add}" method="post" enctype="multipart/form-data">
        <div class="form-grid">
            <div class="form-group">
                <label for="modName">Mod名称 *</label>
                <input type="text" id="modName" name="modName" required>
            </div>
            <div class="form-group">
                <label for="version">版本号</label>
                <select id="version" name="version" required disabled>
                    <option value="">正在加载版本列表...</option>
                </select>
            </div>
            <div class="form-group full-width">
                <label for="downloadUrl">下载链接 *</label>
                <input type="url" id="downloadUrl" name="downloadUrl" required>
            </div>
            <div class="form-group full-width">
                <label for="description">简介</label>
                <textarea id="description" name="description" rows="3" placeholder="简单描述Mod功能..."></textarea>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn">上传</button>
            <a href="/mods/" class="btn-cancel">取消</a>
        </div>
    </form>
</div>

<footer class="main-footer">
    <p>© 2025 Minecraft 世界管理平台 | 使用 Spring Boot + Thymeleaf 构建</p>
</footer>

<script>
    // 动态加载 Minecraft 版本列表（仅正式版）
    const versionSelect = document.getElementById('version');

    async function loadVersions() {
        try {
            const response = await fetch('https://launchermeta.mojang.com/mc/game/version_manifest_v2.json');
            const data = await response.json();
            // 过滤出 type 为 release 的版本
            const releases = data.versions.filter(v => v.type === 'release');
            // 按时间倒序（最新的在前）
            releases.sort((a, b) => new Date(b.releaseTime) - new Date(a.releaseTime));

            // 清空并填充选项
            versionSelect.innerHTML = '';
            if (releases.length === 0) {
                const option = document.createElement('option');
                option.textContent = '暂无版本数据';
                option.disabled = true;
                versionSelect.appendChild(option);
            } else {
                releases.forEach(release => {
                    const option = document.createElement('option');
                    option.value = release.id;
                    option.textContent = release.id;
                    versionSelect.appendChild(option);
                });
            }
            versionSelect.disabled = false;
        } catch (error) {
            console.error('加载版本失败:', error);
            versionSelect.innerHTML = '<option value="">加载失败，请刷新重试</option>';
            versionSelect.disabled = false;
        }
    }

    // 页面加载完成后执行
    window.addEventListener('DOMContentLoaded', () => loadVersions());
</script>
</body>
</html>
