<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MC 世界管理 - Mod 列表</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/script.js"></script>
</head>
<body>
<!-- 头部区域 -->
<div id="header-container"></div>

<div class="container">
    <h1>🧩 Minecraft Mod 列表</h1>
    <a href="/mods/add" class="btn">➕ 上传新 Mod</a>
    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Mod 名称</th>
                <th>上传时间</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
                <tr th:each="m : ${mods}">
                    <td th:text="${m.id}">1</td>
                    <td th:text="${m.modName}">小地图</td>
                    <td th:text="${#temporals.format(m.createdAt, 'yyyy-MM-dd HH:mm')}">2025-01-01</td>
                    <td>
                        <a th:href="${m.downloadUrl}" class="btn-view" target="_blank">下载</a>
                        <a th:href="@{/mods/delete/{id}(id=${m.id})}" class="btn-del" onclick="return confirm('确定删除吗？')">删除</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${mods.isEmpty()}" class="empty-tip">
        <p>暂无 Mod 数据，点击上方“上传新 Mod”添加你的第一个 Mod！</p>
    </div>
</div>

<footer class="main-footer">
    <p>© 2025 Minecraft 世界管理平台 | 使用 Spring Boot + Thymeleaf 构建</p>
</footer>
</body>
</html>
